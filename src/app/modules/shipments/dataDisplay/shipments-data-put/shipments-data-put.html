<div class="page-container">

  <div class="content">

    <h2 class="title">Update Shipment</h2>

    <!-- Toast Notification -->
    @if(showToast) {
      <div [ngClass]="['toast', toastType]">
        {{ toastMessage }}
      </div>
    }

    <div class="card">

      <form [formGroup]="shipmentsForm" (ngSubmit)="handleUpdate()" class="form">

        <!-- Shipment ID -->
        <div class="form-group">
          <label>Shipment ID *</label>
          <input type="number" formControlName="shipmentId" placeholder="Enter shipment ID">
        </div>

        <!-- Customer and Store -->
        <div class="form-row">

          <div class="form-group half">
            <label>Customer ID *</label>
            <input type="number" formControlName="customerId" placeholder="Enter customer ID">
          </div>

          <div class="form-group half">
            <label>Store ID *</label>
            <input type="number" formControlName="storeId" placeholder="Enter store ID">
          </div>

        </div>

        <!-- Delivery Address -->
        <div class="form-group">
          <label>Delivery Address *</label>
          <textarea formControlName="deliveryAddress" placeholder="Enter delivery address"></textarea>
        </div>

        <!-- Buttons -->
        <div class="button-group">
          <button type="submit" [disabled]="shipmentsForm.invalid" class="btn-primary">
            Update
          </button>

          <button type="button" class="btn-secondary" (click)="goBack()">
            Cancel
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

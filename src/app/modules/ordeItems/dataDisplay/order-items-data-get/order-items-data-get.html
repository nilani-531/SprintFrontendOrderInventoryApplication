<div class="page">

  <div class="container">

    <h2 class="title">Order Items Data Fetch</h2>

    <!-- ✅ Query Type Selection -->
    <form class="card">

      <div class="input-row">

        <label>
          <input
            type="radio"
            name="queryType"
            [checked]="queryType === 'order'"
            (change)="setQueryType('order')"
          />
          By Order ID
        </label>

        <label>
          <input
            type="radio"
            name="queryType"
            [checked]="queryType === 'product'"
            (change)="setQueryType('product')"
          />
          By Product ID
        </label>

      </div>

    </form>

    <!-- ✅ FORM -->
    <form [formGroup]="form" class="card">

      <div class="input-row">

        <input
          type="number"
          formControlName="id"
          [placeholder]="queryType === 'order' ? 'Enter Order ID' : 'Enter Product ID'"
          class="input-box"
        />

        <button
          *ngIf="queryType === 'order'"
          type="button"
          (click)="getItemsByOrder()"
          class="btn primary">
          Get Items by Order
        </button>

        <button
          *ngIf="queryType === 'product'"
          type="button"
          (click)="getItemsByProduct()"
          class="btn primary">
          Get Items by Product
        </button>

        <button
          *ngIf="queryType === 'product'"
          type="button"
          (click)="getTotalQuantity()"
          class="btn secondary">
          Get Total Quantity
        </button>

      </div>

    </form>

    <!-- Loading -->
    <div *ngIf="loading" class="info">
      Loading...
    </div>

    <!-- Error -->
    <div *ngIf="error" class="error">
      {{ error }}
    </div>

    <!-- ✅ Total Quantity Display -->
    <div *ngIf="totalQuantity !== null && totalQuantity !== undefined" class="card">

      <h3>Total Quantity</h3>

      <p><strong>Total Quantity for Product:</strong> {{ totalQuantity }}</p>

    </div>

    <!-- ✅ Order Items Table -->
    <div *ngIf="orderItems.length > 0" class="card">

      <h3>Order Items</h3>

      <table>

        <thead>
          <tr>
            <th>Line Item ID</th>
            <th>Order ID</th>
            <th>Product ID</th>
            <th>Quantity</th>
            <th>Unit Price</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of orderItems">
            <td>{{ item.lineItemId }}</td>
            <td>{{ item.orderId }}</td>
            <td>{{ item.productId }}</td>
            <td>{{ item.quantity }}</td>
            <td>${{ item.unitPrice | number:'1.2-2' }}</td>
          </tr>
        </tbody>

      </table>

    </div>

  </div>

</div>

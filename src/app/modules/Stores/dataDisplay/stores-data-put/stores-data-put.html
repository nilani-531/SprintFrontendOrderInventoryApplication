<div class="page-container">

  <div class="content">

    <h2 class="title">Update Store</h2>

    <div class="card">

      <!-- LOADING -->
      <div *ngIf="isLoading">Loading store...</div>

      <!-- FORM -->
      <form [formGroup]="storeForm" (ngSubmit)="handleUpdate()">

        <!-- STORE NAME (USED FOR SEARCH) -->
        <div class="form-group">
          <label>Search by Store Name (optional)</label>

          <input type="text"
                 placeholder="Enter store name"
                 #nameInput>

          <button type="button"
                  (click)="fetchByName(nameInput.value)">
            Load by Name
          </button>
        </div>

        <hr />

        <!-- STORE ID (READ ONLY) -->
        <div class="form-group">
          <label>Store ID</label>
          <input formControlName="storeId" readonly>
        </div>

        <!-- NAME -->
        <div class="form-group">
          <label>Name</label>
          <input formControlName="storeName">
        </div>

        <!-- WEB -->
        <div class="form-group">
          <label>Web Address</label>
          <input formControlName="webAddress">
        </div>

        <!-- ADDRESS -->
        <div class="form-group">
          <label>Physical Address</label>
          <input formControlName="physicalAddress">
        </div>

        <!-- LAT -->
        <div class="form-group">
          <label>Latitude</label>
          <input formControlName="latitude">
        </div>

        <!-- LONG -->
        <div class="form-group">
          <label>Longitude</label>
          <input formControlName="longitude">
        </div>

        <button type="submit">Update Store</button>
        <button type="button" (click)="goBack()">Cancel</button>

      </form>
    </div>

    <!-- ERROR -->
    <div *ngIf="error" class="error-box">
      {{ error }}
    </div>

    <!-- SUCCESS -->
    <div *ngIf="success" class="success-box">
      {{ success }}
    </div>

  </div>
</div>

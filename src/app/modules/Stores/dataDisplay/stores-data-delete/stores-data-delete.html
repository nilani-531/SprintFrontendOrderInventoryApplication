<div class="container">

  <h2>Delete Store By ID</h2>

  <form [formGroup]="deleteForm" (ngSubmit)="deleteById()">

    <div class="input-group">
      <input 
        type="number"
        formControlName="storeId"
        placeholder="Enter Store ID"
      />

      <button type="submit" class="delete-btn">
        Delete
      </button>
    </div>

  </form>

</div>
<div class="message-container">
  @if (message) {
    <p class="success show">{{ message }}</p>
  }

  @if (error) {
    <p class="error show">{{ error }}</p>
  }
</div>

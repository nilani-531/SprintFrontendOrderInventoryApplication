<div class="page-container">

  <!-- Show cards only when no child route is active -->
  <div class="api-display" *ngIf="!isRouteActive()">

    <h2 class="title"> Orders API Dashboard </h2>

    <div class="grid">

      <div class="card" *ngFor="let endpt of endpoints">

        <span class="method-badge"> {{ endpt.method }} </span>

        <h3 class="card-title"> {{ endpt.name }} </h3>

        <p class="card-desc"> {{ endpt.desc }} </p>

        <button class="card-btn" [routerLink]="['/modules/orders', endpt.route]"> Open Endpoint </button>

      </div>

    </div>

  </div>

</div>
<router-outlet></router-outlet>

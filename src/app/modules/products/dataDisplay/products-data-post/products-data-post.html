<div class="page-container">

  <div class="content">

    <h2 class="title">Create Product</h2>

    @if(error){
      <div class="error-box">
        {{ error }}
      </div>
    }

    <div class="card">

      <form [formGroup]="productsForm" (ngSubmit)="handleSubmit()" class="form">

        <!-- Product Name -->
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" formControlName="productName" placeholder="Enter product name">

          @if(productsForm.controls.productName.touched && productsForm.controls.productName.errors){
            <p class="error">*Product name is required</p>
          }
        </div>

        <!-- Unit Price -->
        <div class="form-group">
          <label>Unit Price *</label>
          <input type="number" formControlName="unitPrice" placeholder="Enter price" step="0.01">

          @if(productsForm.controls.unitPrice.touched && productsForm.controls.unitPrice.errors){
            <p class="error">*Unit price is required and must be >= 0</p>
          }
        </div>

        <!-- Brand and Colour -->
        <div class="form-row">
          <div class="form-group half">
            <label>Brand</label>
            <input type="text" formControlName="brand" placeholder="Enter brand">
          </div>

          <div class="form-group half">
            <label>Colour</label>
            <input type="text" formControlName="colour" placeholder="Enter colour">
          </div>
        </div>

        <!-- Size and Rating -->
        <div class="form-row">
          <div class="form-group half">
            <label>Size</label>
            <input type="text" formControlName="size" placeholder="Enter size">
          </div>

          <div class="form-group half">
            <label>Rating</label>
            <input type="number" formControlName="rating" placeholder="Enter rating" min="0" max="5">
          </div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
          <button type="submit" [disabled]="productsForm.invalid" class="btn-primary">
            Create
          </button>

          <button type="button" class="btn-secondary">
            Cancel
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

<div class="page-container">
  @if (!isRouteActive()) {
    <div class="api-display">
      <button class="back-btn" (click)="goBack()">&#8592; Dashboard</button>
      <h2 class="title">Customers API Dashboard</h2>
      <div class="grid">
        @for (endpt of endpoints; track endpt) {
          <div class="card">
            <span class="method-badge method-{{ endpt.method.toLowerCase() }}">{{ endpt.method }}</span>
            <h3 class="card-title">{{ endpt.name }}</h3>
            <p class="card-desc">{{ endpt.desc }}</p>
            <button class="card-btn" [routerLink]="['/modules/customers', endpt.route]">
              Open Endpoint
            </button>
          </div>
        }
      </div>
    </div>
  }
  @if (isRouteActive()) {
    <div style="margin-bottom: 15px">
      <button class="back-btn" [routerLink]="['/modules/customers']">↩ Customers Dashboard</button>
    </div>
  }
  <router-outlet></router-outlet>
</div>
